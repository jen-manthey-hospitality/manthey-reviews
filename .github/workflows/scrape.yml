name: Daily Review Scraper

on:
  schedule:
    - cron: '0 6 * * *'  # Runs daily at 6 AM UTC
  workflow_dispatch:     # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        env:
          SUPABASE_URL: https://ofgicptdoygttkyndrnb.supabase.co
          SUPABASE_ANON_KEY: sb_publishable_CSaPz3PkfOn6eEUpBoWxWQ_l7IaTzAK
        run: npm run scrape

      - name: Commit results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Review Scraper Bot"
          git add -A
          git commit -m "chore: automated review scrape $(date +'%Y-%m-%d')" || true
          git push

name: Daily Review Scraper

on:
  schedule:
    - cron: '0 6 * * *'  # Runs daily at 6 AM UTC
  workflow_dispatch:     # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Puppeteer system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Run scraper
        env:
          SUPABASE_URL: https://ofgicptdoygttkyndrnb.supabase.co
          SUPABASE_ANON_KEY: sb_publishable_CSaPz3PkfOn6eEUpBoWxWQ_l7IaTzAK
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
        run: npm run scrape

      - name: Log completion
        if: success()
        run: echo "✓ Review scrape completed successfully at $(date)"

      - name: Log errors
        if: failure()
        run: echo "✗ Review scrape failed - check logs above"
